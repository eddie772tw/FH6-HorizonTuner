name: FH6 HorizonTuner CI Pipeline (Pure Rust)

on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "master", "main" ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # Job 1: Rust Backend Lint, Formatting & Tests (Optimized on Linux with Rust Cache)
  rust-ci:
    name: Rust Backend CI
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install Tauri Linux System Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libsoup-3.0-dev libjavascriptcoregtk-4.1-dev

    - name: Set up Rust Toolchain
      uses: dtolnay/rust-toolchain@stable
      with:
        components: rustfmt, clippy

    - name: Enable Rust Cargo Cache
      uses: Swatinem/rust-cache@v2
      with:
        workspaces: frontend/src-tauri -> target

    - name: Rust Code Formatting Check
      run: cargo fmt --manifest-path frontend/src-tauri/Cargo.toml -- --check

    - name: Rust Clippy Linting Check
      run: cargo clippy --manifest-path frontend/src-tauri/Cargo.toml --all-targets -- -D warnings

    - name: Rust Unit & Integration Tests
      run: cargo test --manifest-path frontend/src-tauri/Cargo.toml

  # Job 2: Frontend TypeScript & Physics Math Unit Tests
  frontend-ci:
    name: Frontend TypeScript CI
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json

    - name: Install Frontend Dependencies
      run: npm --prefix frontend install

    - name: Execute Vitest Physics & Tuning Tests
      run: npm --prefix frontend run test

  # Job 3: Pure Rust Tauri Executable Build Verification
  build-verification:
    name: Tauri Release Build Verification
    needs: [rust-ci, frontend-ci]
    runs-on: windows-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json

    - name: Set up Rust Toolchain
      uses: dtolnay/rust-toolchain@stable

    - name: Enable Rust Cargo Cache
      uses: Swatinem/rust-cache@v2
      with:
        workspaces: frontend/src-tauri -> target

    - name: Install Frontend Dependencies
      run: npm --prefix frontend install

    - name: Build Pure Rust Tauri Executable
      run: npm --prefix frontend run tauri build
