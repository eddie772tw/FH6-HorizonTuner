name: FH6 HorizonTuner CI Pipeline

on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "master", "main" ]
  workflow_dispatch: # 容許在 GitHub Action 介面上手動點擊執行

permissions:
  contents: read

jobs:
  # 任務 1：Ruff 靜態代碼與格式檢查
  lint:
    runs-on: ubuntu-latest
    # 設定 environment 使其需要在 GitHub 上獲得批准後才能執行。
    # 註：需要在 GitHub Repository Settings -> Environments 建立名為 "CI-Approval" 的環境，並設定 "Required reviewers"。
    environment: CI-Approval
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Run Ruff Check
      uses: astral-sh/ruff-action@v3
      with:
        args: "check --output-format=github ."

    - name: Run Ruff Format Verification
      uses: astral-sh/ruff-action@v3
      with:
        args: "format --check ."

  # 任務 2：跨平台測試與邏輯驗證
  test:
    runs-on: ${{ matrix.os }}
    # 同樣需要 GitHub 上的環境審批
    environment: CI-Approval
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest]
        python-version: ["3.13"]

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip'

    - name: Upgrade pip and install core requirements
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Execute automated test suite via pytest
      run: |
        python -m pytest -v
